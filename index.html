<script>
// AUDIO
let audio = document.getElementById("audio");

// PLAY SONG
function playSong(el, song){
  audio.src = song;
  audio.play();
  document.getElementById("nowPlaying").innerText = "Playing: " + song;

  document.querySelectorAll(".song").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
}

// PLAYER CONTROL
function play(){ audio.play(); }
function pause(){ audio.pause(); }
function setVolume(v){ audio.volume = v; }

// ❤️ LIKE SYSTEM (SAVED)
let likes = localStorage.getItem("likes") || 0;
document.getElementById("likeCount") && (document.getElementById("likeCount").innerText = likes);

function like(){
  likes++;
  localStorage.setItem("likes", likes);
  document.getElementById("likeCount").innerText = likes;
}

// 💬 COMMENTS (SAVED)
function addComment(){
  let input = document.getElementById("commentInput");
  let comments = JSON.parse(localStorage.getItem("comments")) || [];

  if(input.value !== ""){
    comments.push(input.value);
    localStorage.setItem("comments", JSON.stringify(comments));
    displayComments();
    input.value="";
  }
}

function displayComments(){
  let comments = JSON.parse(localStorage.getItem("comments")) || [];
  let div = document.getElementById("comments");

  if(div){
    div.innerHTML="";
    comments.forEach(c=>{
      div.innerHTML += "<p>💬 "+c+"</p>";
    });
  }
}

displayComments();
  </script>
