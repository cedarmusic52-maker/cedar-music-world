<!DOCTYPE html>
<html>
<head>
    <title>Cedar Music World</title>
</head>
    <style>
body {
    background: linear-gradient(to bottom, #121212, #000);
    color: white;
    text-align: center;
    font-family: Arial;
}

h1 {
    color: #1DB954;
}

button {
    background: #1DB954;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #1ed760;
}

.socials a {
    color: white;
    font-size: 24px;
    margin: 10px;
    transition: 0.3s;
}

.socials a:hover {
    color: #1DB954;
    text-shadow: 0 0 10px #1DB954;
}
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body style="background:black; color:white; text-align:center; font-family:Arial;">

    <h1>🎵 Cedar Music World 🎵</h1>

    <!-- ARTIST SECTION -->
    <img src="cover.jpg" width="200" style="border-radius:50%; box-shadow:0 0 10px white;">
    <h2>Cedar Boy 🎶</h2>
    <p>Artist: Cedar</p>
    <!-- SOCIAL MEDIA LINKS -->
    <!-- SOCIAL ICONS -->
<div class="socials">
    <a href="https://instagram.com/cedarboy" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://facebook.com/cedarboy" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://twitter.com/cedarboy" target="_blank"><i class="fab fa-twitter"></i></a>
    <a href="https://tiktok.com/@cedarboy" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="https://youtube.com/@cedarboy" target="_blank"><i class="fab fa-youtube"></i></a>
</div>

    <!-- MUSIC PLAYER -->
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <br><br>

    <!-- FOLLOW & LIKE (BOTTOM) -->
    <button onclick="follow()">➕ Follow</button>
    <button onclick="like()">❤️ Like (<span id="likeCount2">0</span>)</button>

    <hr>
    

    <!-- COMMENTS -->
    <h3>💬 Comments</h3>
    <input type="text" id="commentInput" placeholder="Write a comment...">
    <button onclick="addComment()">Post</button>

    <div id="comments"></div>

    <script>
        let likes = 0;

        function like() {
            likes++;
            document.getElementById("likeCount").innerText = likes;
            document.getElementById("likeCount2").innerText = likes;
        }

        function follow() {
            alert("You followed Cedar Boy!");
        }

        function addComment() {
            let input = document.getElementById("commentInput");
            let comment = input.value;

            if(comment !== "") {
                let div = document.getElementById("comments");
                let p = document.createElement("p");
                p.innerText = comment;
                div.appendChild(p);
                input.value = "";
            }
        }
    </script>

</body>
</html>
