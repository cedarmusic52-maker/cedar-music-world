<!DOCTYPE html>
<html>
<head>
    <title>Cedar Music World</title>
</head>

<body style="background:black; color:white; text-align:center; font-family:Arial;">

    <h1>🎵 Cedar Music World 🎵</h1>

    <!-- ARTIST SECTION -->
    <img src="cover.jpg" width="200" style="border-radius:50%; box-shadow:0 0 10px white;">
    <h2>Cedar Boy 🎶</h2>
    <p>Artist: Cedar</p>

    <!-- FOLLOW & LIKE (TOP) -->
    <button onclick="follow()">➕ Follow</button>
    <button onclick="like()">❤️ Like (<span id="likeCount">0</span>)</button>

    <hr>

    <!-- MUSIC PLAYER -->
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <br><br>

    <!-- FOLLOW & LIKE (BOTTOM) -->
    <button onclick="follow()">➕ Follow</button>
    <button onclick="like()">❤️ Like (<span id="likeCount2">0</span>)</button>

    <hr>

    <!-- COMMENTS -->
    <h3>💬 Comments</h3>
    <input type="text" id="commentInput" placeholder="Write a comment...">
    <button onclick="addComment()">Post</button>

    <div id="comments"></div>

    <script>
        let likes = 0;

        function like() {
            likes++;
            document.getElementById("likeCount").innerText = likes;
            document.getElementById("likeCount2").innerText = likes;
        }

        function follow() {
            alert("You followed Cedar Boy!");
        }

        function addComment() {
            let input = document.getElementById("commentInput");
            let comment = input.value;

            if(comment !== "") {
                let div = document.getElementById("comments");
                let p = document.createElement("p");
                p.innerText = comment;
                div.appendChild(p);
                input.value = "";
            }
        }
    </script>

</body>
</html>￼Enter
