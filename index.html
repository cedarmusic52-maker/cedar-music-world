<!DOCTYPE html>
<html>
<head>
<title>Cedar Music World</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family: Arial;
  background: #121212;
  color: white;
  text-align: center;
}

/* HEADER */
h1 {
  color: #1DB954;
  margin-top: 20px;
}

/* ARTIST */
.artist-img {
  width: 180px;
  border-radius: 50%;
  box-shadow: 0 0 25px #1DB954;
}

/* SOCIALS */
.socials i {
  font-size: 25px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.socials i:hover {
  color: #1DB954;
  text-shadow: 0 0 10px #1DB954;
}

/* PLAYER */
audio {
  width: 80%;
  margin-top: 20px;
}

/* BUTTONS */
button {
  background: #1DB954;
  border: none;
  padding: 12px;
  margin: 10px;
  border-radius: 20px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1ed760;
  box-shadow: 0 0 10px #1DB954;
}

/* PLAYLIST */
.playlist button {
  display: block;
  width: 80%;
  margin: 10px auto;
}

/* ALBUMS */
.albums {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.album {
  background: #181818;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.album:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #1DB954;
}

.album img {
  width: 120px;
  border-radius: 10px;
}

/* COMMENTS */
input {
  padding: 10px;
  width: 60%;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<h1>🎵 Cedar Music World 🎵</h1>

<img src="cover.jpg" class="artist-img">
<h2>Cedar Boy 🎶</h2>
<p>Artist: Cedar</p>

<!-- SOCIALS -->
<div class="socials">
<i class="fab fa-instagram"></i>
<i class="fab fa-facebook"></i>
<i class="fab fa-tiktok"></i>
<i class="fab fa-youtube"></i>
</div>

<hr>

<!-- PLAYER -->
<audio id="player" controls>
<source src="song.mp3">
</audio>

<!-- VOLUME -->
<br><br>
<label>🔊 Volume</label><br>
<input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">

<hr>

<!-- PLAYLIST -->
<h3>🎵 Playlist</h3>
<div class="playlist">
<button onclick="playSong('song.mp3')">▶ Cedar Boy</button>
<button onclick="playSong('song2.mp3')">▶ Another Song</button>
</div>

<hr>

<!-- ALBUMS -->
<h3>📀 Albums</h3>
<div class="albums">
<div class="album">
<img src="cover.jpg">
<p>Album 1</p>
</div>

<div class="album">
<img src="cover2.jpg">
<p>Album 2</p>
</div>

<div class="album">
<img src="cover3.jpg">
<p>Album 3</p>
</div>
</div>

<hr>

<!-- LIKE -->
<button onclick="like()">❤️ Like (<span id="likeCount">0</span>)</button>

<hr>

<!-- COMMENTS -->
<h3>💬 Comments</h3>
<input type="text" id="commentInput" placeholder="Write comment...">
<button onclick="addComment()">Post</button>
<div id="comments"></div>

<hr>

<!-- DONATE -->
<h3>💰 Support Artist</h3>
<button onclick="showPayment()">Donate</button>

<script>
let likes = 0;

function like(){
  likes++;
  document.getElementById("likeCount").innerText = likes;
}

function playSong(song){
  let player = document.getElementById("player");
  player.src = song;
  player.play();
}

function setVolume(value){
  document.getElementById("player").volume = value;
}

function addComment(){
  let input = document.getElementById("commentInput");
  if(input.value !== ""){
    document.getElementById("comments").innerHTML += "<p>💬 " + input.value + "</p>";
    input.value = "";
  }
}

function showPayment(){
  alert("Send to OPay:\nName: Cedar Boy\nNumber: 9029118284");
}
</script>

</body>
  </html>
