<!DOCTYPE html>
<html>
<head>
<title>Cedar Music World</title>

<style>
body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Arial;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:200px;
  background:black;
  height:100vh;
  padding:20px;
}

.main {
  flex:1;
  padding:20px;
}

.song {
  background:#181818;
  padding:10px;
  margin:10px 0;
  cursor:pointer;
}

.song:hover {
  background:#1DB954;
}

/* PLAYER */
.player {
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Cedar 🎵</h2>
<p>Home</p>
<p>Albums</p>
</div>

<div class="main">
<h1>Cedar Music World</h1>

<div class="song" onclick="playSong('song.mp3')">▶ Cedar Boy</div>
<div class="song" onclick="playSong('song2.mp3')">▶ Another Song</div>

<br><br><br>
</div>

<div class="player">
<span id="nowPlaying">No song</span>
<audio id="audio" controls></audio>
</div>

<script>
let audio = document.getElementById("audio");

function playSong(song){
  audio.src = song;
  audio.play();
  document.getElementById("nowPlaying").innerText = "Playing: " + song;
}
</script>

</body>
</html>
