<!DOCTYPE html>
<html>
<head>
<title>Cedar Music World</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
  text-align:center;
}

#lockScreen {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

button {
  background:#1DB954;
  border:none;
  padding:10px;
  color:white;
  margin:5px;
}

.artist-img {
  width:200px;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="lockScreen">
<h2>Enter Code</h2>
<input type="password" id="passwordInput">
<button onclick="unlockSite()">Enter</button>
</div>

<h1>Cedar Music World</h1>

<img src="cover.jpg" class="artist-img">

<audio id="player" controls>
<source src="song.mp3">
</audio>

<br><br>

<button onclick="playSong('song.mp3')">Play Song</button>

<button onclick="showPayment()">Donate</button>

<script>
function unlockSite(){
  let p = document.getElementById("passwordInput").value;
  if(p==="1234"){
    document.getElementById("lockScreen").style.display="none";
  } else {
    alert("Wrong code");
  }
}

function playSong(song){
  let player=document.getElementById("player");
  player.src=song;
  player.play();
}

function showPayment(){
  alert("Send to OPay: 9029118284");
}
</script>

</body>
</html>
